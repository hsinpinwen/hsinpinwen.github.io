{{ define "main" }}

<style>
/* Poster Grid - Centered with larger size */
.projects-section .projects-grid {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem;
    max-width: 1200px;
    margin: 0 auto;
}

.poster-container {
    max-width: 500px;  /* Makes poster larger - adjust this value */
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    transition: transform 0.3s ease;
    background: #f0f0f0;
    margin: 0 auto;  /* Centers the poster */
}

.poster-container:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
}

.poster-link {
    text-decoration: none;
    display: block;
}

.poster-wrapper {
    position: relative;
    overflow: hidden;
}

.poster-image {
    width: 100%;
    height: auto;
    display: block;
    transition: filter 0.3s ease;
}

.poster-wrapper:hover .poster-image {
    filter: brightness(0.5);
}

.poster-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0));
    padding: 30px 15px 20px 15px;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.poster-wrapper:hover .poster-info {
    opacity: 1;
}

.poster-info-content {
    text-align: center;
    color: white;
}

.poster-conference {
    font-size: 1rem;
    font-weight: bold;
    margin-bottom: 5px;
}

.poster-location {
    font-size: 0.85rem;
    margin-bottom: 5px;
    opacity: 0.9;
}

.poster-date {
    font-size: 0.85rem;
    margin-bottom: 10px;
    opacity: 0.9;
    font-style: italic;
}

.poster-view {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 0.85rem;
    transition: background 0.2s;
}

.poster-view:hover {
    background: rgba(255,255,255,0.3);
}

.vignette-header {
    text-align: center;
    margin: 2rem 0;
}

.vignette-header h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
}

/* Responsive */
@media only screen and (max-width: 768px) {
    .poster-container {
        max-width: 350px;  /* Slightly smaller on mobile */
    }
    
    .poster-conference {
        font-size: 0.9rem;
    }
    
    .poster-location, .poster-date {
        font-size: 0.75rem;
    }
    
    .poster-view {
        font-size: 0.8rem;
        padding: 4px 10px;
    }
    
    .vignette-header h1 {
        font-size: 2rem;
    }
}
</style>

<div class="vignette-header">
  <h1>Posters</h1>
</div>

<section class="projects-section">
  <div class="projects-grid">

    {{ range .Pages }}
    <div class="poster-container">
      <a href="{{ .Params.pdflink }}" target="_blank" class="poster-link">
        <div class="poster-wrapper">
          <img src="{{ .Params.image }}" class="poster-image" alt="{{ .Title }}">
          <div class="poster-info">
            <div class="poster-info-content">
              <div class="poster-conference">{{ .Params.conference }}</div>
              <div class="poster-location">{{ .Params.location }}</div>
              <div class="poster-date">{{ .Params.date_display | default .Params.date }}</div>
              <div class="poster-view">📄 View PDF</div>
            </div>
          </div>
        </div>
      </a>
    </div>
    {{ end }}

  </div>
</section>

{{ end }}
